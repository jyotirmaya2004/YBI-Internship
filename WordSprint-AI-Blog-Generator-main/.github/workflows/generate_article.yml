name: Generate Daily Article

on:
  schedule:
    - cron: '30 21 * * *'   # 03:00 IST (21:30 UTC)

  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate (YYYY-MM-DD). Leave empty for today.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run only (no file writes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Required so the bot can git push back to the repo
permissions:
  contents: write

jobs:
  generate:
    name: Generate Article
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Generate article via LangGraph
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          DATE_ARG=""
          DRY_RUN_ARG=""

          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          uv run backend/run.py $DATE_ARG $DRY_RUN_ARG

      - name: Commit and push generated article
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add frontend/blogs/
          git add backend/schedule.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Article Update: $(date -u +'%Y-%m-%d')"
            git push
          fi
